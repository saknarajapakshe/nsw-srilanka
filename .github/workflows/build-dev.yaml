# Workflow to build and push development images to GHCR (backend + portals).
name: Build and Push Development Image (nsw-srilanka)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Cancel in-progress runs for the same branch when a new commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-dev:
    name: Build & Push Dev – ${{ matrix.service_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: NSW Backend API
            image_name: nsw-backend
            context: .
            dockerfile: ./Dockerfile
          - service_name: Trader Portal
            image_name: onetrade-app
            context: ./portals
            dockerfile: ./portals/apps/trader-app/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository owner to lowercase
        id: repo_owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          # Sequential run numbers let Argo CD Image Updater sort/detect the newest dev builds.
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo_owner.outputs.owner }}/${{ matrix.image_name }}:dev-${{ github.run_number }}-${{ github.sha }}
          # Scope cache per image so the two matrix builds don't overwrite each other's layers.
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}