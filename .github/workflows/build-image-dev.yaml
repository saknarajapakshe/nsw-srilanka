# Reusable workflow: build one development image and push it to GHCR.
# Called by the per-service trigger workflows (build-backend-dev, build-migrate-dev,
# build-portal-dev), each of which supplies the context/dockerfile/target inputs.
name: Build & Push Dev Image

on:
  workflow_call:
    inputs:
      service_name:
        description: Human-readable service name (display only).
        required: true
        type: string
      image_name:
        description: GHCR image repository name (e.g. nsw-backend).
        required: true
        type: string
      context:
        description: Docker build context path.
        required: true
        type: string
      dockerfile:
        description: Path to the Dockerfile.
        required: true
        type: string
      target:
        description: Build stage to target. Empty builds the default (last) stage.
        required: false
        type: string
        default: ""

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-dev:
    name: Build & Push Dev – ${{ inputs.service_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repository owner to lowercase
        id: repo_owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          # Empty for default-stage images; set to `migrate` for the migrator.
          target: ${{ inputs.target }}
          push: true
          # Sequential run numbers let Argo CD Image Updater sort/detect the newest dev builds.
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo_owner.outputs.owner }}/${{ inputs.image_name }}:dev-${{ github.run_number }}-${{ github.sha }}
          # Scope cache per image so concurrent builds don't overwrite each other's layers.
          cache-from: type=gha,scope=${{ inputs.image_name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.image_name }}
