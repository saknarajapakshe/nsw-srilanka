name: Portals CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'portals/**'
      - '.github/workflows/portals-ci.yml'

jobs:
  # STAGE 1: Code Quality & Build
  # Groups Type Check, Lint, and Build.
  # These all require the exact same 'pnpm install' environment.
  qa-and-build:
    name: Quality Check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./portals
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.18.0'
          cache: 'pnpm'
          cache-dependency-path: './portals/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 1. Type Check (Strict)
      # We run this first. If types are broken, there is no point linting or building.
      - name: TypeScript Type Check
        run: pnpm run type-check

      # 2. Lint
      # TODO: Fix pre-existing lint errors and remove continue-on-error to enforce linting.
      - name: Run ESLint
        run: pnpm run --recursive --parallel lint
        continue-on-error: true

      # 3. Check Formatting (Prettier)
      - name: Check Formatting (Prettier)
        run: pnpm run format:check

      # 4. Build (Final Verification)
      # Only runs if Type Check passed.
      - name: Build all workspaces
        run: pnpm run build

  # STAGE 2: Security
  # Only runs if the code builds successfully (Fail-Fast).
  security-scan:
    name: Security Scan
    needs: qa-and-build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./portals
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Dependency Review needs the git history to compare base/head.
      # TODO: Remove continue-on-error once GitHub Dependency Graph is enabled for this repo
      # (requires a repo admin to enable it under Settings → Code security and analysis).
      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        continue-on-error: true
        with:
          base-ref: ${{ github.event.pull_request.base.sha }}
          head-ref: ${{ github.event.pull_request.head.sha }}

      # Setup environment for Audit
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.1.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.18.0'
          cache: 'pnpm'
          cache-dependency-path: './portals/pnpm-lock.yaml'

      # Audit usually doesn't need a full install, but it needs the lockfile.
      # Running install ensures the lockfile is valid and synced.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail the build on high-severity advisories in production dependencies.
      # --prod excludes devDep tool chains (vite, rollup, etc.) from the audit.
      - name: Run pnpm audit
        run: pnpm audit --prod --audit-level=high
