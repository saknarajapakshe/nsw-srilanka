version: '3.8'

networks:
  nsw-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  thunder_db:
    driver: local
  consent_db:
    driver: local
  temporal_data:
    driver: local

services:
  # -------------------------------------------------------------------
  # 1. Shared Infrastructure Database (PostgreSQL)
  # -------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: nsw-postgres
    networks:
      - nsw-network
    ports:
      # Expose standard port on localhost for migration tooling scripts to fire against
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-nsw_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-nsw_db}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # -------------------------------------------------------------------
  # 2. Identity Provider Core Services (Thunder Stack)
  # -------------------------------------------------------------------
  # Stage A: Seed static database schemas from container image layer
  thunder-db-init:
    image: ghcr.io/asgardeo/thunder:0.35.0
    container_name: thunder-db-init
    command: sh -c "cp -r /opt/thunder/repository/database/* /data/ && (cp -r /opt/thunder/consent/repository/database/* /consent-data/ 2>/dev/null || true)"
    volumes:
      - thunder_db:/data
      - consent_db:/consent-data
    restart: "no"

  # Stage B: Run bootstrap logic once SQLite files have mounted
  thunder-setup:
    image: ghcr.io/asgardeo/thunder:0.35.0
    container_name: thunder-setup
    command: ./setup.sh
    networks:
      - nsw-network
    env_file:
      - ./idp/.env
    volumes:
      - thunder_db:/opt/thunder/repository/database
      - consent_db:/opt/thunder/consent/repository/database
      - ./idp/01-default-resources.sh:/opt/thunder/bootstrap/01-default-resources.sh
      - ./idp/02-sample-resources.sh:/opt/thunder/bootstrap/02-sample-resources.sh
    depends_on:
      thunder-db-init:
        condition: service_completed_successfully
    restart: "no"

  # Stage C: Boot active server instances listening for authentication queries
  idp:
    image: ghcr.io/asgardeo/thunder:0.35.0
    container_name: nsw-idp
    networks:
      - nsw-network
    ports:
      - "${IDP_PORT:-8090}:${IDP_PORT:-8090}"
    env_file:
      - ./idp/.env
    volumes:
      - thunder_db:/opt/thunder/repository/database
      - consent_db:/opt/thunder/consent/repository/database
      - ./idp/deployment.yaml:/opt/thunder/repository/conf/deployment.yaml
    depends_on:
      thunder-setup:
        condition: service_completed_successfully

  # -------------------------------------------------------------------
  # 3. Temporal Workflow Engine Infrastructure
  # -------------------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:1.28.3
    container_name: temporal
    networks:
      - nsw-network
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${DB_USERNAME:-postgres}
      - POSTGRES_PWD=${DB_PASSWORD:-changeme}
      - POSTGRES_SEEDS=db
      - DB_NAME=temporal
    depends_on:
      db:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.48.0
    container_name: temporal-ui
    networks:
      - nsw-network
    ports:
      - "${TEMPORAL_UI_PORT:-8233}:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  # -------------------------------------------------------------------
  # 4. Database Migrations
  # -------------------------------------------------------------------
  migrate:
    image: postgres:16-bookworm
    container_name: nsw-migrate
    networks:
      - nsw-network
    working_dir: /src/migrations
    volumes:
      - .:/src
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-nsw_db}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - MIGRATION_DB_HOST=db
      - NPQS_OGA_SUBMISSION_URL=${NPQS_OGA_SUBMISSION_URL:-http://host.docker.internal:8081/api/v1/inject}
      - FCAU_OGA_SUBMISSION_URL=${FCAU_OGA_SUBMISSION_URL:-http://host.docker.internal:8082/api/v1/inject}
      - PRECONSIGNMENT_OGA_SUBMISSION_URL=${PRECONSIGNMENT_OGA_SUBMISSION_URL:-http://host.docker.internal:8083/api/v1/inject}
      - CDA_OGA_SUBMISSION_URL=${CDA_OGA_SUBMISSION_URL:-http://host.docker.internal:8084/api/v1/inject}
    command: bash -c "which bash && bash --version && bash run.sh --clean-run"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # -------------------------------------------------------------------
  # 5. Backend Orchestration API Layer (Local Hot-Reload Setup)
  # -------------------------------------------------------------------
  api:
    image: golang:1.25-bookworm
    container_name: nsw-backend-api
    networks:
      - nsw-network
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    working_dir: /src
    volumes:
      # Direct local host application path mapping
      - .:/src
      # Flexible multi-repo developer mapping slots
      - type: bind
        source: ../nsw
        target: /nsw
        bind:
          create_host_path: false
      - type: bind
        source: ../nsw-task-flow
        target: /nsw-task-flow
        bind:
          create_host_path: false
      - type: bind
        source: ../go-temporal-workflow
        target: /go-temporal-workflow
        bind:
          create_host_path: false
    environment:
      # Target relational store parameter mapping
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-nsw_db}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      # Engine configuration variables
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      # Context variables translated directly from old start-dev parameters
      - SERVER_PORT=8080
      - SERVER_DEBUG=${SERVER_DEBUG:-true}
      - SERVER_LOG_LEVEL=${SERVER_LOG_LEVEL:-info}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177}
      # Core JWT Validation configs addressing the IdP container internally via network bridge
      # - AUTH_ISSUER=${AUTH_ISSUER:-https://idp:${IDP_PORT:-8090}}
      # - AUTH_JWKS_URL=${AUTH_JWKS_URL:-https://idp:${IDP_PORT:-8090}/oauth2/jwks}
      - AUTH_ISSUER=https://localhost:${IDP_PORT:-8090}
      - AUTH_JWKS_URL=https://idp:${IDP_PORT:-8090}/oauth2/jwks
      - AUTH_CLIENT_IDS=${AUTH_CLIENT_IDS:-TRADER_PORTAL_APP,FCAU_TO_NSW,NPQS_TO_NSW,IRD_TO_NSW,CDA_TO_NSW}
      - AUTH_AUDIENCE=${AUTH_AUDIENCE:-NSW_API}
      - AUTH_JWKS_INSECURE_SKIP_VERIFY=${AUTH_JWKS_INSECURE_SKIP_VERIFY:-true}
      - FCAU_OGA_SUBMISSION_URL=http://host.docker.internal:8082/api/v1/inject
      - NPQS_OGA_SUBMISSION_URL=http://host.docker.internal:8081/api/v1/inject
      - PRECONSIGNMENT_OGA_SUBMISSION_URL=http://host.docker.internal:8083/api/v1/inject
      - CDA_OGA_SUBMISSION_URL=http://host.docker.internal:8084/api/v1/inject
      # Workspace path linkage variables
      - GOWORK=/src/go.work
      - SERVICES_CONFIG_PATH=configs/services.docker.json
    command: go run ./cmd/server
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      temporal:
        condition: service_started
      idp:
        condition: service_started
